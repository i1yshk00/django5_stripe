name: CI

# CI отвечает только за проверку pull request-ов перед merge.
# Push в main/master уже обслуживается workflow `CD` (`deploy.yml`),
# который сам прогоняет те же тесты перед деплоем — дублировать их в
# отдельном CI-запуске нет смысла, это только удваивает GitHub minutes.
on:
  pull_request:

jobs:
  django:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_API_VERSION: 2026-02-25.clover
      DOMAIN_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Poetry должен быть установлен ДО `actions/setup-python`, потому что
      # `cache: poetry` ищет executable в PATH во время восстановления кеша.
      # Если ставить poetry позже, шаг setup-python падает с
      # `Unable to locate executable file: poetry`.
      - name: Install Poetry
        run: pipx install poetry==1.8.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Django check
        run: poetry run python manage.py check

      - name: Tests
        run: poetry run python manage.py test
