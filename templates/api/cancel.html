<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Оплата отменена</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #081122;
            color: #e5e7eb;
            font-family: Inter, system-ui, sans-serif;
        }

        .shell {
            width: min(720px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid #1f2937;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.92);
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(248, 113, 113, 0.12);
            color: #f87171;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: 34px;
        }

        p {
            margin: 0;
            color: #94a3b8;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main class="shell">
        <span class="badge">Canceled</span>
        <h1>Оплата отменена</h1>
        <p>
            Пользователь вернулся со страницы Stripe Checkout без завершения оплаты.
            {% if item_id %}
                Идентификатор товара: {{ item_id }}.
            {% endif %}
            {% if order_id %}
                Идентификатор заказа: {{ order_id }}.
            {% endif %}
        </p>
    </main>
</body>
</html>
